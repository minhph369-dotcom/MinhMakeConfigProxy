<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINHMAKECONFIG VIP</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="card">

<div class="logo">
🤖
</div>

<h1>MINHMAKECONFIG VIP</h1>

<div class="box">
<label>🌐 IP hiện tại</label>
<div id="ip">Đang tải...</div>
</div>

<div class="box">
<label>🔑 Nhập KEY</label>

<input
id="key"
type="text"
placeholder="VIP-XXXX-XXXX-XXXX">

<button onclick="activeKey()">
ACTIVE KEY
</button>

</div>

<div class="status">

<h2>Thông tin kích hoạt</h2>

<div class="row">
<span>Trạng thái</span>
<b id="status">Chưa kích hoạt</b>
</div>

<div class="row">
<span>Loại Key</span>
<b id="type">---</b>
</div>

<div class="row">
<span>Ngày kích hoạt</span>
<b id="active">---</b>
</div>

<div class="row">
<span>Ngày hết hạn</span>
<b id="expire">---</b>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
